<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Delta QT - Blox Fruits Hub</title>
    <style>
        body {
            background-color: #0a0a0a;
            color: #00ff41;
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        /* Hiệu ứng mờ ảo phía sau */
        .bg-effect {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle, rgba(0, 255, 65, 0.1) 0%, rgba(0,0,0,1) 70%);
            z-index: -1;
        }

        .container {
            text-align: center;
            border: 2px solid #00ff41;
            padding: 40px;
            background: rgba(0, 0, 0, 0.8);
            box-shadow: 0 0 20px #00ff41;
            border-radius: 10px;
            max-width: 400px;
        }

        h1 {
            font-size: 2.5rem;
            text-transform: uppercase;
            letter-spacing: 5px;
            margin-bottom: 10px;
            text-shadow: 0 0 10px #00ff41;
        }

        p {
            color: #ffffff;
            font-size: 1.1rem;
            margin-bottom: 30px;
        }

        .hack-btn {
            display: inline-block;
            padding: 15px 30px;
            font-size: 1.2rem;
            color: #000;
            background-color: #00ff41;
            text-decoration: none;
            font-weight: bold;
            border-radius: 5px;
            transition: all 0.3s ease;
            box-shadow: 0 0 15px #00ff41;
            cursor: pointer;
        }

        .hack-btn:hover {
            background-color: #ffffff;
            box-shadow: 0 0 30px #ffffff;
            transform: scale(1.1);
        }

        .status {
            margin-top: 20px;
            font-size: 0.8rem;
            opacity: 0.7;
        }

        /* Hiệu ứng nhấp nháy chữ */
        .blink {
            animation: blinker 1s linear infinite;
        }

        @keyframes blinker {
            50% { opacity: 0; }
        }
    </style>
</head>
<body>

    <div class="bg-effect"></div>

    <div class="container">
        <h1>Delta QT</h1>
        <p>HACK BLOX FRUITS</p>
        
        <a href="https://delta.filenetwork.vip/android.html" class="hack-btn">
            DOWNLOAD NOW
        </a>

        <div class="status">
            Status: <span style="color: #00ff41;">Online</span> | Ver: 2.6xx<br>
            <span class="blink">Waiting for injection...</span>
        </div>
    </div>

</body>
</html>
