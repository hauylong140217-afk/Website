<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DELTA EXPLOIT | MULTI-TAB SYSTEM</title>
    <style>
        body {
            background-color: #000;
            color: #00ff41;
            font-family: 'Courier New', Courier, monospace;
            margin: 0;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        canvas {
            position: absolute;
            top: 0; left: 0;
            z-index: 1;
            opacity: 0.4;
        }

        .container {
            position: relative;
            z-index: 2;
            width: 450px;
            background: rgba(0, 0, 0, 0.9);
            border: 2px solid #00ff41;
            box-shadow: 0 0 40px #00ff41;
            border-radius: 8px;
            padding: 0;
            overflow: hidden;
        }

        /* Tab Header */
        .tabs {
            display: flex;
            border-bottom: 2px solid #00ff41;
            background: #0a0a0a;
        }

        .tab-btn {
            flex: 1;
            padding: 15px;
            cursor: pointer;
            border: none;
            background: none;
            color: #00ff41;
            font-family: inherit;
            font-weight: bold;
            font-size: 1rem;
            transition: 0.3s;
            text-transform: uppercase;
        }

        .tab-btn:hover {
            background: rgba(0, 255, 65, 0.1);
        }

        .tab-btn.active {
            background: #00ff41;
            color: #000;
        }

        /* Content Area */
        .content {
            padding: 40px 20px;
            text-align: center;
            display: none;
        }

        .content.active {
            display: block;
            animation: fadeIn 0.5s;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .glitch-title {
            font-size: 3rem;
            font-weight: 900;
            margin: 0 0 10px 0;
            text-shadow: 2px 2px #fff;
            animation: shake 0.5s infinite;
        }

        @keyframes shake {
            0% { transform: translate(1px, 1px) rotate(0deg); }
            10% { transform: translate(-1px, -2px) rotate(-1deg); }
            30% { transform: translate(3px, 2px) rotate(0deg); }
            50% { transform: translate(-1px, 2px) rotate(1deg); }
            100% { transform: translate(1px, -2px) rotate(-1deg); }
        }

        .desc {
            font-size: 0.9rem;
            margin-bottom: 30px;
            color: #fff;
            letter-spacing: 1px;
        }

        .download-btn {
            display: inline-block;
            padding: 15px 35px;
            background: #00ff41;
            color: #000;
            text-decoration: none;
            font-weight: bold;
            font-size: 1.1rem;
            box-shadow: 0 0 20px #00ff41;
            transition: 0.3s;
            clip-path: polygon(5% 0, 100% 0, 95% 100%, 0 100%);
        }

        .download-btn:hover {
            background: #fff;
            box-shadow: 0 0 40px #fff;
            transform: scale(1.05);
        }

        .footer {
            padding: 15px;
            font-size: 0.7rem;
            opacity: 0.6;
            text-align: center;
        }
    </style>
</head>
<body>

    <canvas id="matrix"></canvas>

    <div class="container">
        <div class="tabs">
            <button class="tab-btn active" onclick="openTab(event, 'tab1')">Roblox QT</button>
            <button class="tab-btn" onclick="openTab(event, 'tab2')">Roblox VNG</button>
        </div>

        <div id="tab1" class="content active">
            <div class="glitch-title">DELTA QT</div>
            <p class="desc">GLOBAL EXECUTOR - BLOX FRUITS</p>
            <a href="https://delta.filenetwork.vip/android.html" class="download-btn" target="_blank">ACCESS WEB</a>
        </div>

        <div id="tab2" class="content">
            <div class="glitch-title">ROBLOX X</div>
            <p class="desc">VNG BYPASS VERSION - AUTO HACK</p>
            <a href="https://bandishare.io/delta-x-apk-1/download/1/" class="download-btn" target="_blank">ACCESS WEB</a>
        </div>

        <div class="footer">
            SYSTEM STATUS: INJECTED | SECURED BY DELTA TEAM
        </div>
    </div>

    <script>
        // Chuyển đổi Tab
        function openTab(evt, tabName) {
            var i, content, tabBtn;
            content = document.getElementsByClassName("content");
            for (i = 0; i < content.length; i++) {
                content[i].classList.remove("active");
            }
            tabBtn = document.getElementsByClassName("tab-btn");
            for (i = 0; i < tabBtn.length; i++) {
                tabBtn[i].classList.remove("active");
            }
            document.getElementById(tabName).classList.add("active");
            evt.currentTarget.classList.add("active");
        }

        // Hiệu ứng Matrix Rain
        const canvas = document.getElementById('matrix');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        const alphabet = "ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789☠☢☣";
        const fontSize = 16;
        const columns = canvas.width / fontSize;
        const drops = Array(Math.floor(columns)).fill(1);

        function drawMatrix() {
            ctx.fillStyle = "rgba(0, 0, 0, 0.05)";
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = "#00ff41";
            ctx.font = fontSize + "px arial";

            for (let i = 0; i < drops.length; i++) {
                const text = alphabet.charAt(Math.floor(Math.random() * alphabet.length));
                ctx.fillText(text, i * fontSize, drops[i] * fontSize);
                if (drops[i] * fontSize > canvas.height && Math.random() > 0.975) drops[i] = 0;
                drops[i]++;
            }
        }
        setInterval(drawMatrix, 35);
        window.onresize = () => { canvas.width = window.innerWidth; canvas.height = window.innerHeight; };
    </script>
</body>
</html>
