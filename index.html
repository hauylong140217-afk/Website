<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Delta QT - WARNING</title>
    <style>
        body {
            background-color: #000;
            color: #ff0000;
            font-family: 'Courier New', Courier, monospace;
            margin: 0;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        /* Hiệu ứng Matrix phía sau */
        canvas {
            position: absolute;
            top: 0;
            left: 0;
            z-index: 1;
            opacity: 0.3;
        }

        .container {
            position: relative;
            z-index: 2;
            text-align: center;
            border: 1px solid #ff0000;
            padding: 50px;
            background: rgba(0, 0, 0, 0.9);
            box-shadow: 0 0 30px #ff0000;
            border-radius: 5px;
        }

        /* Hiệu ứng Glitch cho chữ */
        .glitch {
            font-size: 3rem;
            font-weight: bold;
            text-transform: uppercase;
            position: relative;
            text-shadow: 0.05em 0 0 rgba(255, 0, 0, 0.75),
                         -0.025em -0.05em 0 rgba(255, 0, 0, 0.75),
                         0.025em 0.05em 0 rgba(255, 0, 0, 0.75);
            animation: glitch 500ms infinite;
        }

        @keyframes glitch {
            0% { text-shadow: 2px 3px 5px red; transform: translate(1px, 1px); }
            25% { text-shadow: -2px -3px 5px red; transform: translate(-1px, -2px); }
            50% { text-shadow: 2px -3px 5px red; transform: translate(-2px, 1px); }
            100% { text-shadow: -2px 3px 5px red; transform: translate(2px, -1px); }
        }

        p.warning {
            color: #fff;
            letter-spacing: 2px;
            margin-bottom: 30px;
            font-size: 1.2rem;
        }

        .hack-btn {
            display: inline-block;
            padding: 15px 40px;
            color: #000;
            background-color: #ff0000;
            text-decoration: none;
            font-weight: bold;
            border: none;
            box-shadow: 0 0 20px #ff0000;
            transition: 0.3s;
            text-transform: uppercase;
        }

        .hack-btn:hover {
            background-color: #fff;
            box-shadow: 0 0 40px #fff;
            transform: scale(1.1) rotate(-2deg);
        }

        .footer-text {
            margin-top: 25px;
            font-size: 0.7rem;
            color: #555;
        }
    </style>
</head>
<body>

    <canvas id="matrix"></canvas>

    <div class="container">
        <div class="glitch">Delta QT</div>
        <p class="warning">HACK BLOX FRUITS - EXECUTOR</p>
        
        <a href="https://delta.filenetwork.vip/android.html" class="hack-btn">
            ACCESS EXPLOIT
        </a>

        <div class="footer-text">
            SYSTEM COMPROMISED...<br>
            NO TURNING BACK.
        </div>
    </div>

    <script>
        // Hiệu ứng Matrix Rain
        const canvas = document.getElementById('matrix');
        const ctx = canvas.getContext('2d');

        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        const letters = "DELTAQT01010101☠️☢️HACKER";
        const fontSize = 16;
        const columns = canvas.width / fontSize;
        const drops = Array(Math.floor(columns)).fill(1);

        function draw() {
            ctx.fillStyle = "rgba(0, 0, 0, 0.05)";
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            ctx.fillStyle = "#ff0000"; // Màu mưa rơi (Đỏ)
            ctx.font = fontSize + "px arial";

            for (let i = 0; i < drops.length; i++) {
                const text = letters.charAt(Math.floor(Math.random() * letters.length));
                ctx.fillText(text, i * fontSize, drops[i] * fontSize);

                if (drops[i] * fontSize > canvas.height && Math.random() > 0.975) {
                    drops[i] = 0;
                }
                drops[i]++;
            }
        }

        setInterval(draw, 33);
    </script>
</body>
</html>
