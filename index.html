<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Delta International | HACK BLOX FRUITS</title>
    <style>
        body {
            background-color: #000;
            color: #00ff41;
            font-family: 'Courier New', Courier, monospace;
            margin: 0;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        /* Hiệu ứng Matrix xanh lá dày đặc */
        canvas {
            position: absolute;
            top: 0;
            left: 0;
            z-index: 1;
            opacity: 0.6;
        }

        .container {
            position: relative;
            z-index: 2;
            text-align: center;
            border: 2px solid #00ff41;
            padding: 50px;
            background: rgba(0, 0, 0, 0.9);
            box-shadow: 0 0 40px #00ff41;
            border-radius: 10px;
            max-width: 500px;
        }

        /* Chữ Delta chuẩn quốc tế với hiệu ứng Glitch */
        .delta-title {
            font-size: 4.5rem;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 10px;
            margin: 0;
            color: #fff;
            text-shadow: 3px 0 #00ff41, -3px 0 #00ff41;
            animation: glitch 0.4s infinite;
        }

        @keyframes glitch {
            0% { transform: skew(2deg); }
            20% { transform: skew(-2deg); }
            40% { transform: skew(1deg); }
            60% { transform: skew(-1deg); }
            100% { transform: skew(0); }
        }

        .sub-text {
            color: #00ff41;
            font-size: 1.2rem;
            margin-bottom: 35px;
            font-weight: bold;
            text-transform: uppercase;
        }

        /* Nút bấm vào web */
        .hack-btn {
            display: inline-block;
            padding: 15px 40px;
            font-size: 1.3rem;
            color: #000;
            background-color: #00ff41;
            text-decoration: none;
            font-weight: bold;
            border-radius: 5px;
            transition: 0.3s;
            box-shadow: 0 0 20px #00ff41;
            text-transform: uppercase;
        }

        .hack-btn:hover {
            background-color: #fff;
            box-shadow: 0 0 40px #fff;
            transform: scale(1.1);
        }

        .status-box {
            margin-top: 30px;
            font-size: 0.85rem;
            border-top: 1px solid rgba(0, 255, 65, 0.3);
            padding-top: 15px;
            line-height: 1.5;
        }
    </style>
</head>
<body>

    <canvas id="matrix"></canvas>

    <div class="container">
        <div class="delta-title">DELTA QT</div>
        <p class="sub-text">HACK BLOX FRUITS - EXECUTOR</p>
        
        <a href="https://delta.filenetwork.vip/android.html" class="hack-btn">
            NHẤN ĐỂ VÀO WEB
        </a>

        <div class="status-box">
            Trạng thái: <span style="color: #fff;">ĐANG HOẠT ĐỘNG</span><br>
            Phiên bản: International v2.6xx<br>
            <span style="opacity: 0.6;">Đang chờ dữ liệu hệ thống...</span>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('matrix');
        const ctx = canvas.getContext('2d');

        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        const charList = "010101DELTAQT☢️☠️☣️#$&%*";
        const fontSize = 16;
        const columns = canvas.width / fontSize;
        const drops = Array(Math.floor(columns)).fill(1);

        function draw() {
            ctx.fillStyle = "rgba(0, 0, 0, 0.05)";
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = "#00ff41";
            ctx.font = fontSize + "px arial";

            for (let i = 0; i < drops.length; i++) {
                const text = charList.charAt(Math.floor(Math.random() * charList.length));
                ctx.fillText(text, i * fontSize, drops[i] * fontSize);

                if (drops[i] * fontSize > canvas.height && Math.random() > 0.975) {
                    drops[i] = 0;
                }
                drops[i]++;
            }
        }

        setInterval(draw, 33);
        window.onresize = () => { canvas.width = window.innerWidth; canvas.height = window.innerHeight; };
    </script>
</body>
</html>
