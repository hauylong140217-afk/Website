<!DOCTYPE html>

    <style>
        body {
            background-color: #000;
            color: #00ff41;
            font-family: 'Courier New', Courier, monospace;
            margin: 0;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        canvas {
            position: absolute;
            top: 0; left: 0;
            z-index: 1;
            opacity: 0.5;
        }

        .container {
            position: relative;
            z-index: 2;
            width: 550px; /* Tăng chiều rộng để cân bằng 3 tab */
            background: rgba(0, 0, 0, 0.95);
            border: 2px solid #00ff41;
            box-shadow: 0 0 50px rgba(0, 255, 65, 0.3);
            border-radius: 10px;
            overflow: hidden;
            backdrop-filter: blur(10px);
        }

        /* Tab System */
        .tabs {
            display: flex;
            border-bottom: 2px solid #00ff41;
            background: #050505;
        }

        .tab-btn {
            flex: 1;
            padding: 18px;
            cursor: pointer;
            border: none;
            background: none;
            color: #00ff41;
            font-family: inherit;
            font-weight: bold;
            font-size: 0.85rem;
            transition: 0.4s;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .tab-btn:hover {
            background: rgba(0, 255, 65, 0.1);
        }

        .tab-btn.active {
            background: #00ff41;
            color: #000;
        }

        /* Content Sections */
        .content {
            padding: 50px 25px;
            text-align: center;
            display: none;
        }

        .content.active {
            display: block;
            animation: glitchEffect 0.3s ease-in-out;
        }

        @keyframes glitchEffect {
            0% { opacity: 0; transform: scale(0.95); }
            100% { opacity: 1; transform: scale(1); }
        }

        .glitch-title {
            font-size: 3rem;
            font-weight: 900;
            margin: 0;
            color: #fff;
            text-shadow: 3px 0 #00ff41, -3px 0 #00ff41;
            animation: shake 0.2s infinite alternate;
        }

        @keyframes shake {
            0% { transform: translate(1px, 0); }
            100% { transform: translate(-1px, 0); }
        }

        .desc {
            font-size: 1rem;
            margin: 15px 0 35px 0;
            color: #fff;
            letter-spacing: 2px;
            opacity: 0.8;
            text-transform: uppercase;
        }

        .download-btn {
            display: inline-block;
            padding: 18px 45px;
            background: #00ff41;
            color: #000;
            text-decoration: none;
            font-weight: bold;
            font-size: 1.2rem;
            box-shadow: 0 0 25px #00ff41;
            transition: 0.3s;
            clip-path: polygon(10% 0, 100% 0, 90% 100%, 0 100%);
        }

        .download-btn:hover {
            background: #fff;
            box-shadow: 0 0 50px #fff;
            transform: scale(1.1) rotate(-1deg);
        }

        /* Footer */
        .footer {
            padding: 20px;
            font-size: 0.75rem;
            background: rgba(0, 0, 0, 0.8);
            border-top: 1px solid rgba(0, 255, 65, 0.3);
            text-align: center;
            line-height: 1.6;
        }

        .status-on {
            color: #00ff41;
            text-shadow: 0 0 5px #00ff41;
        }
    </style>
</head>
<body>

    <canvas id="matrix"></canvas>

    <div class="container">
        <div class="tabs">
            <button class="tab-btn active" onclick="openTab(event, 'tab1')">Roblox Global</button>
            <button class="tab-btn" onclick="openTab(event, 'tab2')">Roblox VNG</button>
            <button class="tab-btn" onclick="openTab(event, 'tab3')">Swift PC</button>
        </div>

        <div id="tab1" class="content active">
            <div class="glitch-title">ROBLOX GLOBAL</div>
            <p class="desc">INTERNATIONAL EXECUTOR</p>
            <a href="https://delta.filenetwork.vip/android.html" class="download-btn" target="_blank">ACCESS HUB</a>
        </div>

        <div id="tab2" class="content">
            <div class="glitch-title">ROBLOX X VNG</div>
            <p class="desc">VNG BYPASS EDITION</p>
            <a href="https://gloopup.net/Delta/android_vn/" class="download-btn" target="_blank">GET DOWNLOAD</a>
        </div>

        <div id="tab3" class="content">
            <div class="glitch-title">SWIFT PC</div>
            <p class="desc">WINDOWS DESKTOP EXECUTOR</p>
            <a href="Swift.exe" download="Swift.exe" class="download-btn">DOWNLOAD SWIFT.EXE</a>
        </div>

        <div class="footer">
            SYSTEM STATUS: <span class="status-on">ACTIVE</span> | ENCRYPTION: AES-256<br>
            <span style="color: #666;">LAST MODIFIED: MARCH 05, 2026 - SERVER_03</span>
        </div>
    </div>

    <script>
        function openTab(evt, tabName) {
            let i, content, tabBtn;
            content = document.getElementsByClassName("content");
            for (i = 0; i < content.length; i++) {
                content[i].classList.remove("active");
            }
            tabBtn = document.getElementsByClassName("tab-btn");
            for (i = 0; i < tabBtn.length; i++) {
                tabBtn[i].classList.remove("active");
            }
            document.getElementById(tabName).classList.add("active");
            evt.currentTarget.classList.add("active");
        }

        const canvas = document.getElementById('matrix');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        const chars = "ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789☠☢☣$#@&";
        const fontSize = 18;
        const columns = canvas.width / fontSize;
        const drops = Array(Math.floor(columns)).fill(1);

        function drawMatrix() {
            ctx.fillStyle = "rgba(0, 0, 0, 0.08)";
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = "#00ff41";
            ctx.font = fontSize + "px arial";

            for (let i = 0; i < drops.length; i++) {
                const text = chars.charAt(Math.floor(Math.random() * chars.length));
                ctx.fillText(text, i * fontSize, drops[i] * fontSize);
                if (drops[i] * fontSize > canvas.height && Math.random() > 0.98) drops[i] = 0;
                drops[i]++;
            }
        }
        setInterval(drawMatrix, 30);

        window.onresize = () => {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        };
    </script>
</body>
